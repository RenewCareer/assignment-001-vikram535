name: GitHub Classroom Autograding

# Runs on every push — this is what GitHub Classroom monitors
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  # ── Fast syntax / import check ──────────────────────────────────────────
  lint:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax
        run: python -m py_compile starter/python_basics.py starter/data_structures.py starter/control_flow.py && echo "✅ No syntax errors found"

  # ── Part 1 — Variables & Data Types (30 pts) ───────────────────────────
  test-part1:
    name: "Part 1 · Variables & Data Types (30 pts)"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Part 1 tests
        run: pytest tests/test_python_basics.py -v --tb=short

  # ── Part 2 — Data Structures (40 pts) ──────────────────────────────────
  test-part2:
    name: "Part 2 · Data Structures (40 pts)"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Part 2 tests
        run: pytest tests/test_data_structures.py -v --tb=short

  # ── Part 3 — Control Flow (30 pts) ─────────────────────────────────────
  test-part3:
    name: "Part 3 · Control Flow (30 pts)"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Part 3 tests
        run: pytest tests/test_control_flow.py -v --tb=short

  # ── Full suite + coverage summary ──────────────────────────────────────
  autograding:
    name: "🎓 Autograding Summary"
    runs-on: ubuntu-latest
    needs: [test-part1, test-part2, test-part3]
    if: always()   # run even if individual parts failed
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full test suite with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=starter \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -q 2>&1 | tee pytest-output.txt
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: pytest-output.txt

      - name: Report final result
        run: |
          echo "──────────────────────────────────────────"
          echo "   ASSIGNMENT 1 — AUTOGRADING COMPLETE"
          echo "──────────────────────────────────────────"
          grep -E "passed|failed|error" pytest-output.txt | tail -1 || true
